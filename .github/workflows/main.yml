# This GitHub Actions workflow contains four jobs:
# -- First, Lint Code runs on Ubuntu with Python 3.10, 3.11, 3.12, 3.13, and 3.14
# to check the code for formatting and linting defects using the uv lint task.
# -- Second, Test uses a strategy matrix to test the code with different
# operating systems (Ubuntu, macOS, Windows) and Python versions (3.10,
# 3.11, 3.12, 3.13, 3.14), using the uv test task.
# -- Third, Test Coverage runs on Ubuntu with Python 3.10, 3.11, 3.12, 3.13, and
# 3.14 to check that test coverage meets the minimum threshold.
# -- Fourth, Lint Markdown uses the latest Ubuntu image and markdownlint to
# check markdown files for defects.

name: Lint and Test

on: [push, pull_request]

jobs:
  lint:
    name: Lint Code (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Lint code
        run: uv run task lint

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Execute tests
        run: uv run task test

  coverage:
    name: Test Coverage (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Collect test coverage
        run: uv run task cover

  markdownlint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Lint writing
        uses: actionshub/markdownlint@main
